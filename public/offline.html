<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4F56E8" />
  <title>Offline — Advantage Services</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #4F56E8;
      --brand-dark: #3b42c8;
      --emerald: #10b981;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-400: #94a3b8;
      --gray-600: #475569;
      --gray-900: #0f172a;
      --white: #ffffff;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--gray-50);
      color: var(--gray-900);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      padding-top: env(safe-area-inset-top, 24px);
      padding-bottom: env(safe-area-inset-bottom, 24px);
    }

    .card {
      background: var(--white);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
      text-align: center;
    }

    .logo-ring {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -1px;
    }

    .brand-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 8px;
    }

    .offline-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fef3c7;
      color: #92400e;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 20px;
    }

    .offline-dot {
      width: 6px;
      height: 6px;
      background: #f59e0b;
      border-radius: 50%;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--gray-900);
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--gray-600);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .contact-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray-400);
      margin-bottom: 12px;
    }

    .contact-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--gray-100);
      border-radius: 12px;
      padding: 12px 16px;
      text-decoration: none;
      color: var(--gray-900);
      font-weight: 500;
      font-size: 15px;
      transition: background 0.15s;
    }

    .contact-item:hover {
      background: #e2e8f0;
    }

    .contact-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }

    .icon-phone { background: #dbeafe; }
    .icon-whatsapp { background: #d1fae5; }
    .icon-address { background: #ede9fe; }

    .contact-meta {
      text-align: left;
    }

    .contact-meta-label {
      font-size: 11px;
      color: var(--gray-400);
      font-weight: 500;
    }

    .contact-meta-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-900);
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--brand);
      color: var(--white);
      border: none;
      border-radius: 100px;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s, transform 0.1s;
    }

    .retry-btn:hover { background: var(--brand-dark); }
    .retry-btn:active { transform: scale(0.97); }

    .footer-note {
      margin-top: 20px;
      font-size: 12px;
      color: var(--gray-400);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-ring">A</div>
    <p class="brand-name">Advantage Services</p>

    <span class="offline-badge">
      <span class="offline-dot"></span>
      You're offline
    </span>

    <h1>No internet connection</h1>
    <p class="subtitle">
      Here's how to reach us directly —
      we're available 7 days a week.
    </p>

    <p class="contact-label">Contact us now</p>

    <ul class="contact-list">
      <li>
        <a class="contact-item" href="tel:+19299331396">
          <span class="contact-icon icon-phone">📞</span>
          <span class="contact-meta">
            <span class="contact-meta-label">Call us</span>
            <span class="contact-meta-value">(929) 933-1396</span>
          </span>
        </a>
      </li>
      <li>
        <a class="contact-item" href="https://wa.me/19299331396" target="_blank" rel="noopener">
          <span class="contact-icon icon-whatsapp">💬</span>
          <span class="contact-meta">
            <span class="contact-meta-label">WhatsApp</span>
            <span class="contact-meta-value">929-933-1396</span>
          </span>
        </a>
      </li>
      <li>
        <a class="contact-item" href="https://maps.google.com/?q=121-12+Merrick+Blvd+Cambria+Heights+NY" target="_blank" rel="noopener">
          <span class="contact-icon icon-address">📍</span>
          <span class="contact-meta">
            <span class="contact-meta-label">Visit us</span>
            <span class="contact-meta-value">121-12 Merrick Blvd, Cambria Heights, NY</span>
          </span>
        </a>
      </li>
    </ul>

    <button class="retry-btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      Try again
    </button>

    <p class="footer-note">
      Queens / NYC &nbsp;·&nbsp; Mon–Sat 9am–6pm ET
    </p>
  </div>
</body>
</html>
